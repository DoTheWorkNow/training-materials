<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI 实战培训 · Training Materials</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #0b0b1f;
    --bg-1: #1a1040;
    --bg-2: #2a1466;
    --accent-cyan: #22d3ee;
    --accent-magenta: #f472b6;
    --text: #f5f5ff;
    --text-dim: rgba(245, 245, 255, 0.7);
    --card-bg: rgba(255, 255, 255, 0.06);
    --card-border: rgba(255, 255, 255, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: 'Inter', system-ui, -apple-system, 'PingFang SC', sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 800px at 10% -10%, rgba(124, 58, 237, 0.55), transparent 60%),
      radial-gradient(900px 700px at 110% 10%, rgba(34, 211, 238, 0.35), transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1) 60%, var(--bg-2));
    background-attachment: fixed;
    line-height: 1.6;
    overflow-x: hidden;
  }
  .orb {
    position: fixed; width: 520px; height: 520px; border-radius: 50%;
    filter: blur(90px); opacity: 0.35; pointer-events: none; z-index: 0;
    animation: float 18s ease-in-out infinite;
  }
  .orb.a { background: #7c3aed; top: -120px; left: -120px; }
  .orb.b { background: #22d3ee; bottom: -160px; right: -140px; animation-delay: -6s; }
  .orb.c { background: #f472b6; top: 40%; left: 55%; animation-delay: -12s; }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(30px, -40px) scale(1.08); }
  }

  .container { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 80px 32px 120px; }

  header.hero { text-align: center; margin-bottom: 72px; }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 999px;
    background: rgba(255,255,255,0.08); border: 1px solid var(--card-border);
    font-size: 13px; color: var(--text-dim); backdrop-filter: blur(12px);
  }
  .badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--accent-cyan); box-shadow: 0 0 12px var(--accent-cyan); }
  h1 {
    margin-top: 24px; font-size: clamp(40px, 6vw, 76px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.05;
    background: linear-gradient(135deg, #fff 0%, #c7b8ff 40%, #22d3ee 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { margin-top: 20px; font-size: clamp(16px, 1.6vw, 19px); color: var(--text-dim); max-width: 640px; margin-left: auto; margin-right: auto; }

  .grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  .card {
    position: relative; padding: 28px; border-radius: 20px;
    background: var(--card-bg); border: 1px solid var(--card-border);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
    text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 12px;
    overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; inset: 0; border-radius: 20px; padding: 1px;
    background: linear-gradient(135deg, rgba(255,255,255,0.25), transparent 50%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
  }
  .card:hover { transform: translateY(-6px) scale(1.015); border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.09); }
  .card .tag {
    align-self: flex-start; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 6px;
    background: linear-gradient(135deg, rgba(124,58,237,0.6), rgba(34,211,238,0.6));
    color: #fff;
  }
  .card h3 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .card p { color: var(--text-dim); font-size: 15px; }
  .card .arrow { margin-top: auto; font-size: 14px; color: var(--accent-cyan); font-weight: 600; }
  .card:hover .arrow { color: var(--accent-magenta); }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal.visible { opacity: 1; transform: none; }

  footer { margin-top: 96px; text-align: center; color: var(--text-dim); font-size: 13px; }
</style>
</head>
<body>
<div class="orb a"></div>
<div class="orb b"></div>
<div class="orb c"></div>

<div class="container">
  <header class="hero reveal">
    <span class="badge">Training Demo · 2026</span>
    <h1>让 AI 成为<br />你工作里的第二大脑</h1>
    <p class="subtitle">一套面向企业员工的 AI 实战培训内容——从 Claude Code 到 ChatGPT，从原理到落地场景。</p>
  </header>

  <main class="grid" id="course-grid"></main>

  <footer class="reveal">© 2026 · Internal Training · Made with curiosity</footer>
</div>

<script>
  // ─────────────────────────────────────────────────────────────
  // TODO（由你填写）：这里定义培训要展示的模块。
  // 每一项包含 tag（分类标签）、title（标题）、desc（一句话简介）、href（链接，可用 # 占位）。
  // 建议 3-6 项。以下两条是占位示例，请替换成你的真实课程。
  // ─────────────────────────────────────────────────────────────
  const courses = [
    { tag: '示例', title: '替换我：课程一', desc: '一句话说明这门课解决什么问题、给学员带来什么价值。', href: '#' },
    { tag: '示例', title: '替换我：课程二', desc: '一句话说明这门课解决什么问题、给学员带来什么价值。', href: '#' },
  ];

  const grid = document.getElementById('course-grid');
  const createEl = (tag, className, text) => {
    const el = document.createElement(tag);
    if (className) el.className = className;
    if (text != null) el.textContent = text;
    return el;
  };

  courses.forEach((c, i) => {
    const card = createEl('a', 'card reveal');
    card.href = c.href;
    card.style.transitionDelay = (i * 80) + 'ms';
    card.append(
      createEl('span', 'tag', c.tag),
      createEl('h3', null, c.title),
      createEl('p', null, c.desc),
      createEl('span', 'arrow', '进入课程 →'),
    );
    grid.appendChild(card);
  });

  const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.12 });
  document.querySelectorAll('.reveal').forEach((el) => io.observe(el));
</script>
</body>
</html>
